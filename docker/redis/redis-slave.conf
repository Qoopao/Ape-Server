# 继承主节点基础配置
bind 0.0.0.0
port 6379
tcp-keepalive 300
daemonize no
supervised no

# 持久化配置
dir /data
dbfilename dump.rdb
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# 安全配置
requirepass redis123

# 核心：指定主节点地址和密码
replicaof redis-master 6379
masterauth redis123

# 从节点只读（推荐）
replica-read-only yes

# 禁用Redis Cluster
cluster-enabled no

# 内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志配置
loglevel notice
logfile ""