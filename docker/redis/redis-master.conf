# 基础网络配置
bind 0.0.0.0
port 6379
tcp-keepalive 300

# 禁用后台运行（容器内必须为no）
daemonize no
supervised no

# 持久化配置
dir /data
dbfilename dump.rdb
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

requirepass redis123

# 主节点可写
replica-read-only no

# 禁用Redis Cluster（哨兵模式必须关闭）
cluster-enabled no

# 内存限制
maxmemory 256mb
maxmemory-policy allkeys-lru

# 日志配置（核心修正！）
loglevel notice
logfile ""
