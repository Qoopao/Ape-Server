services:
  ape-mysql:
    image: mysql:8.4
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ape_root_password
      MYSQL_DATABASE: ape_auth
      MYSQL_USER: ape_user
      MYSQL_PASSWORD: ape_password
    ports:
      - "3306:3306"
    volumes:
      - ape_mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uape_user", "-pape_password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  ape_mysql_data:
