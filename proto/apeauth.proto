syntax = "proto3";

package auth;

service AuthService {
  rpc Register(RegisterRequest) returns (AuthResponse);
  rpc Login(LoginRequest) returns (AuthResponse);
  rpc ValidateToken(ValidateTokenReq) returns (ValidateTokenResp);
}

message RegisterRequest {
  string username = 1;
  string password = 2;
  string nickname = 3;
}

message LoginRequest {
  string username = 1;
  string password = 2;
}

message ValidateTokenReq {
  string token = 1;
}

message ValidateTokenResp {
  bool valid = 1;
  string user_id = 2;
  string username = 3;
  int64 expires_at = 4;
}

message AuthUser {
  string user_id = 1;
  string username = 2;
  string nickname = 3;
}

message AuthResponse {
  bool success = 1;
  string error_code = 2;
  string error_message = 3;
  string token = 4;
  int64 expires_at = 5;
  AuthUser user = 6;
}