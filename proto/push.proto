syntax = "proto3";
package push;

import "sdkws.proto";

message PushMsgReq {
  sdkws.MsgData msgData = 1;
  string conversationID = 2;
  repeated string userIDs = 3;
}

message PushMsgResp {}

message DelUserPushTokenReq {
  string userID = 1;
  int32 platformID = 2;
}

message DelUserPushTokenResp {}

// AckMsgReq 消息确认请求
// Gateway / 客户端 收到推送到本地的消息后，回调 PushService 完成 ACK
// 统一处理在线消息 ACK 和离线消息 ACK
message AckMsgReq {
  string userID = 1;                       // 用户ID
  string serverMsgID = 2;                  // 已确认收到消息的 serverMsgID
  int64 seq = 3;                           // 消息 seq，用于更新 last_seq
  int32 ackType = 4;                       // ACK 类型: 1=在线消息 2=离线消息
}

message AckMsgResp {}

// AddPendingOfflineAckReq 预登记离线消息待 ACK 项
// 用户上线拉取离线消息时调用，PushService 将该条消息记入 pending_ack 集合
message AddPendingOfflineAckReq {
  string userID = 1;                       // 用户ID
  string serverMsgID = 2;                  // serverMsgID
  int64 seq = 3;                           // 消息 seq
}

message AddPendingOfflineAckResp {}

service PushService {
  rpc PushMsg(PushMsgReq) returns (PushMsgResp);
  rpc DelUserPushToken(DelUserPushTokenReq) returns (DelUserPushTokenResp);
  rpc AckMsg(AckMsgReq) returns (AckMsgResp);
  rpc AddPendingOfflineAck(AddPendingOfflineAckReq) returns (AddPendingOfflineAckResp);
}